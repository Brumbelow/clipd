name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --target x86_64-pc-windows-msvc

      - name: cargo build --release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage portable zip contents
        shell: pwsh
        env:
          STAGE: clipd-${{ github.ref_name }}-x86_64-pc-windows-msvc
        run: |
          New-Item -ItemType Directory -Path $env:STAGE | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/clipd.exe $env:STAGE/
          Copy-Item config.example.toml $env:STAGE/
          Copy-Item README.md $env:STAGE/
          Copy-Item LICENSE-APACHE $env:STAGE/
          Compress-Archive -Path $env:STAGE -DestinationPath "$env:STAGE.zip"
          "ZIP=$env:STAGE.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP }}
          draft: true
          generate_release_notes: true
          name: clipd ${{ github.ref_name }}
